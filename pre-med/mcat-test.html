<!DOCTYPE html>
<!-- MCAT QBank — Test Interface -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UWorld – Test</title>
  <link rel="stylesheet" href="../assets/css/fa7-pro.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/test.css?v=2" />
</head>
<body>

<div class="test-wrap">

  <!-- ════════ TOP TOOLBAR ════════ -->
  <header class="test-topbar">

    <!-- Left: tool icons + topic badge -->
    <div class="ttb-left">
      <button class="tbar-btn" id="btn-bookmark" title="Bookmark" aria-label="Bookmark">
        <i class="fa-light fa-flag"></i>
      </button>
      <button class="tbar-btn" title="Highlight" aria-label="Highlight">
        <i class="fa-light fa-pen-nib"></i>
      </button>
      <button class="tbar-btn" title="Lab Values" aria-label="Lab Values">
        <i class="fa-light fa-flask-vial"></i>
      </button>
      <button class="tbar-btn" title="Add note" aria-label="Add note">
        <i class="fa-light fa-circle-info"></i>
      </button>
      <div class="tbar-sep"></div>
      <span class="topic-badge" id="topic-badge">Topic</span>
    </div>

    <!-- Center: question counter (absolutely centred) -->
    <div class="ttb-center">
      <button class="q-counter-btn" id="q-counter-btn"
              aria-haspopup="true" aria-expanded="false" aria-label="Jump to question">
        <span id="q-num">1</span><span class="q-sep">/</span><span id="q-total">10</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>
    </div>

    <!-- Right: utility icons + timer -->
    <div class="ttb-right">
      <button class="tbar-btn" title="Fullscreen" aria-label="Fullscreen"
              onclick="if(document.fullscreenElement){document.exitFullscreen()}else{document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen()}">
        <i class="fa-light fa-display"></i>
      </button>
      <button class="tbar-btn" title="Help" aria-label="Help">
        <i class="fa-light fa-circle-question"></i>
      </button>
      <button class="tbar-btn" title="Settings" aria-label="Settings">
        <i class="fa-light fa-sliders"></i>
      </button>
      <button class="tbar-btn" title="Toggle layout" aria-label="Toggle layout">
        <i class="fa-light fa-layer-group"></i>
      </button>
      <div class="tbar-sep"></div>
      <div class="test-timer" id="test-timer" aria-live="off">02:48</div>
    </div>

  </header>

  <!-- Question-jump dropdown (appears below topbar, centred) -->
  <div class="q-nav-dropdown" id="q-nav-dropdown" role="dialog" aria-label="Jump to question">
    <div class="qnd-title">Jump to question</div>
    <div class="qnd-grid" id="qnd-grid"><!-- filled by JS --></div>
  </div>

  <!-- ════════ SPLIT PANES ════════ -->
  <div class="test-body">

    <!-- LEFT — Passage -->
    <div class="test-pane test-pane--passage" id="passage-pane">
      <div class="pane-scroll">
        <p class="passage-label" id="passage-label"></p>
        <div class="passage-body" id="passage-body"></div>
        <p class="passage-footer-note" id="passage-note"></p>
      </div>
    </div>

    <!-- RIGHT — Question + Choices -->
    <div class="test-pane test-pane--question">
      <div class="pane-scroll">

        <p class="q-label" id="q-label">Question 1</p>
        <p class="q-stem" id="q-stem"></p>

        <ul class="q-choices" id="q-choices"></ul>

        <button class="q-submit-btn" id="q-submit" disabled>Submit</button>

        <!-- Answer explanation (visible after submit) -->
        <div class="q-explanation" id="q-explanation">
          <div class="q-explanation__label">
            <i id="expl-icon" class="fa-light fa-circle-check expl-correct"></i>
            <span id="expl-verdict"></span>
          </div>
          <p id="expl-text"></p>
        </div>

      </div>
    </div>

  </div><!-- /.test-body -->

  <!-- ════════ BOTTOM BAR ════════ -->
  <footer class="test-bottombar">

    <div class="tbot-left">
      <button class="tbot-action tbot-action--danger" id="btn-end" aria-label="End test">
        <i class="fa-light fa-circle-xmark"></i> End
      </button>
      <div class="tbot-sep"></div>
      <button class="tbot-action" id="btn-suspend" aria-label="Suspend test">
        <i class="fa-light fa-hourglass"></i> Suspend
      </button>
    </div>

    <div class="tbot-center">
      <button class="tbot-feedback" aria-label="Send feedback">
        <i class="fa-light fa-comment-dots"></i> Feedback
      </button>
    </div>

    <div class="tbot-right">
      <button class="tbot-nav" id="btn-prev" aria-label="Previous question" disabled>
        <i class="fa-light fa-arrow-left"></i> Previous
      </button>
      <div class="tbot-sep"></div>
      <button class="tbot-nav" id="btn-next" aria-label="Next question">
        Next <i class="fa-light fa-arrow-right"></i>
      </button>
    </div>

  </footer>

</div><!-- /.test-wrap -->

<script src="../assets/js/test.js"></script>
</body>
</html>
