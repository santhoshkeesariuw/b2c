<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UWorld – Choose Your Exam</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --uw-blue:      #0B6FBE;
      --uw-blue-lt:   #1A80D0;
      --uw-navy:      #1B2D3E;
      --uw-navy-lt:   #243D52;
      --bg:           #EEF1F5;
      --panel-border: #DDE3EA;
      --text-dark:    #1A202C;
      --text-mid:     #2D3748;
      --text-soft:    #4A5568;
      --text-muted:   #718096;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-mid);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ══════════ NAV ══════════ */
    .nav {
      background: var(--uw-navy);
      display: flex;
      align-items: center;
      padding: 0 clamp(20px, 4vw, 60px);
      height: 60px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo  { height: 34px; display: flex; align-items: center; }
    .nav-logo img { height: 34px; width: auto; display: block; }
    .nav-brand-name { font-size: 21px; font-weight: 700; color: #fff; letter-spacing: 0.2px; }
    .nav-spacer { flex: 1; }
    .nav-links { display: flex; align-items: center; gap: clamp(16px, 2vw, 28px); }
    .nav-links a { color: #A0B4C8; text-decoration: none; font-size: 13.5px; transition: color .15s; }
    .nav-links a:hover { color: #fff; }
    .btn-signin {
      background: var(--uw-blue); color: #fff; border: none; border-radius: 5px;
      padding: 7px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: background .15s;
    }
    .btn-signin:hover { background: var(--uw-blue-lt); }

    /* ══════════ HERO ══════════ */
    .hero {
      background: linear-gradient(160deg, var(--uw-navy) 0%, #1e3a54 60%, #1a4a6e 100%);
      padding: clamp(36px, 6vh, 64px) clamp(20px, 4vw, 60px) clamp(40px, 6vh, 70px);
      text-align: center;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(11,111,190,.25); border: 1px solid rgba(11,111,190,.4);
      border-radius: 20px; padding: 4px 14px;
      font-size: 11.5px; font-weight: 600; color: #7EC8F4;
      letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 16px;
    }
    .hero h1 {
      font-size: clamp(26px, 3.8vw, 44px); font-weight: 800; color: #fff;
      line-height: 1.2; margin-bottom: 12px;
    }
    .hero h1 span { color: #5BB8F5; }
    .hero p {
      font-size: clamp(13.5px, 1.3vw, 16px); color: #A0B4C8;
      max-width: 500px; margin: 0 auto; line-height: 1.6;
    }

    /* ══════════ MAIN CONTENT ══════════ */
    .content {
      flex: 1;
      padding: clamp(28px, 4vh, 48px) clamp(20px, 6vw, 80px) clamp(48px, 7vh, 72px);
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* breadcrumb */
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted);
      margin-bottom: clamp(18px, 2.5vh, 28px);
      min-height: 22px;
    }
    .breadcrumb .crumb {
      cursor: pointer; color: var(--uw-blue); font-weight: 500;
      display: flex; align-items: center; gap: 5px;
    }
    .breadcrumb .crumb:hover { text-decoration: underline; }
    .breadcrumb .sep { color: #CBD5E0; font-size: 11px; }
    .breadcrumb .current { color: var(--text-dark); font-weight: 600; }
    .breadcrumb.hidden { display: none; }

    /* section header */
    .section-hd {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: clamp(18px, 2.5vh, 28px);
      flex-wrap: wrap; gap: 8px;
    }
    .section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--uw-blue); margin-bottom: 4px;
    }
    .section-title {
      font-size: clamp(17px, 1.9vw, 22px); font-weight: 700; color: var(--text-dark);
    }
    .section-count {
      font-size: 13px; color: var(--text-muted);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: clamp(12px, 1.6vw, 20px);
    }

    /* ── FOLDER TILE ── */
    .folder {
      background: #fff;
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .18s, transform .18s, border-color .18s;
      position: relative;
      display: flex; flex-direction: column;
    }
    .folder:hover {
      box-shadow: 0 8px 24px rgba(11,111,190,.13);
      transform: translateY(-2px);
      border-color: #B3D4EF;
    }
    .folder.coming-soon { opacity: .55; cursor: not-allowed; }
    .folder.coming-soon:hover { box-shadow: none; transform: none; border-color: var(--panel-border); }

    /* color accent top bar */
    .folder-accent {
      height: 4px;
      background: var(--folder-color, var(--uw-blue));
    }

    .folder-body {
      padding: clamp(16px, 2vw, 22px);
      display: flex; flex-direction: column; gap: 12px; flex: 1;
    }

    .folder-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .folder-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: #fff; flex-shrink: 0;
      background: var(--folder-color, var(--uw-blue));
    }
    .folder-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

    .badge {
      font-size: 10.5px; font-weight: 700; border-radius: 10px;
      padding: 2px 9px; white-space: nowrap;
    }
    .badge-available  { background: #DCFCE7; color: #166534; }
    .badge-soon       { background: #FEF3C7; color: #92400E; }
    .badge-new        { background: #EDE9FE; color: #5B21B6; }

    .folder-name {
      font-size: clamp(14px, 1.3vw, 16px); font-weight: 700; color: var(--text-dark);
    }
    .folder-sub {
      font-size: 12px; color: var(--text-muted); margin-top: 2px;
    }

    .folder-desc {
      font-size: 12.5px; color: var(--text-soft); line-height: 1.55; flex: 1;
    }

    .folder-footer {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid #F3F5F7; padding-top: 10px; margin-top: auto;
    }
    .folder-cta {
      font-size: 12.5px; font-weight: 600;
      color: var(--folder-color, var(--uw-blue));
      display: flex; align-items: center; gap: 5px;
    }
    .folder-cta i { font-size: 10px; transition: transform .18s; }
    .folder:not(.coming-soon):hover .folder-cta i { transform: translateX(3px); }

    .folder-meta {
      display: flex; align-items: center; gap: 4px;
      font-size: 11.5px; color: var(--text-muted);
    }
    .folder-meta i { font-size: 10px; }

    /* ── SUB-PRODUCT TILE (leaf node) ── */
    .product {
      background: #fff; border: 1px solid var(--panel-border);
      border-radius: 10px; overflow: hidden; cursor: pointer;
      transition: box-shadow .18s, transform .18s, border-color .18s;
      display: flex; flex-direction: column;
    }
    .product:hover {
      box-shadow: 0 8px 24px rgba(11,111,190,.13);
      transform: translateY(-2px); border-color: #B3D4EF;
    }
    .product.coming-soon { opacity: .55; cursor: not-allowed; }
    .product.coming-soon:hover { box-shadow: none; transform: none; border-color: var(--panel-border); }

    .product-accent { height: 4px; background: var(--product-color, var(--uw-blue)); }
    .product-body { padding: clamp(16px, 2vw, 22px); display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .product-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .product-icon {
      width: 40px; height: 40px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #fff; flex-shrink: 0;
      background: var(--product-color, var(--uw-blue));
    }
    .product-name { font-size: clamp(13px, 1.2vw, 15px); font-weight: 700; color: var(--text-dark); }
    .product-desc { font-size: 12px; color: var(--text-soft); line-height: 1.5; flex: 1; }
    .product-footer {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid #F3F5F7; padding-top: 10px; margin-top: auto;
    }
    .product-cta {
      font-size: 12.5px; font-weight: 600;
      color: var(--product-color, var(--uw-blue));
      display: flex; align-items: center; gap: 5px;
    }
    .product-cta i { font-size: 10px; transition: transform .18s; }
    .product:not(.coming-soon):hover .product-cta i { transform: translateX(3px); }

    /* view transitions */
    .view { animation: fadeIn .2s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════ FOOTER ══════════ */
    .footer {
      background: var(--uw-navy);
      padding: 22px clamp(20px, 4vw, 60px);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
    }
    .footer-brand { font-size: 14px; font-weight: 700; color: #fff; }
    .footer-copy  { font-size: 12px; color: #6B8BA4; }
    .footer-links { display: flex; gap: 18px; }
    .footer-links a { font-size: 12px; color: #6B8BA4; text-decoration: none; }
    .footer-links a:hover { color: #A0B4C8; }
  </style>
</head>
<body>

<!-- ══════════ NAV ══════════ -->
<nav class="nav">
  <a class="nav-brand" href="index.html">
    <div class="nav-logo"><img src="assets/images/UWorld logo icon.png" alt="UWorld" /></div>
    <span class="nav-brand-name">UWorld</span>
  </a>
  <div class="nav-spacer"></div>
  <div class="nav-links">
    <a href="#">Products</a>
    <a href="#">About</a>
    <a href="#">Support</a>
    <a href="#" class="btn-signin">Sign In</a>
  </div>
</nav>

<!-- ══════════ HERO ══════════ -->
<div class="hero">
  <div class="hero-eyebrow"><i class="fa-solid fa-graduation-cap"></i> Trusted by 3M+ students</div>
  <h1>Prepare Smarter.<br><span>Score Higher.</span></h1>
  <p>Select your exam category to access your personalized QBank, practice exams, and performance analytics.</p>
</div>

<!-- ══════════ CONTENT ══════════ -->
<div class="content">

  <!-- breadcrumb (hidden on root) -->
  <div class="breadcrumb hidden" id="breadcrumb">
    <span class="crumb" onclick="goHome()"><i class="fa-solid fa-house"></i> Home</span>
    <span class="sep"><i class="fa-solid fa-chevron-right"></i></span>
    <span class="current" id="breadcrumb-current"></span>
  </div>

  <!-- dynamic view -->
  <div id="view"></div>

</div>

<!-- ══════════ FOOTER ══════════ -->
<footer class="footer">
  <span class="footer-brand">UWorld</span>
  <span class="footer-copy">© 2025 UWorld, LLC. All rights reserved.</span>
  <div class="footer-links">
    <a href="#">Privacy Policy</a>
    <a href="#">Terms of Use</a>
    <a href="#">Contact Us</a>
  </div>
</footer>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const PRODUCTS = [
  {
    id: 'medical',
    name: 'Medical',
    icon: 'fa-stethoscope',
    color: '#C05621',
    desc: 'USMLE licensing exams and medical school preparation.',
    items: []
  },
  {
    id: 'nursing',
    name: 'Nursing',
    icon: 'fa-heart-pulse',
    color: '#6B46C1',
    desc: 'NCLEX-RN and NCLEX-PN licensure exam preparation for nurses.',
    items: []
  },
  {
    id: 'pre-med',
    name: 'Pre-Med',
    icon: 'fa-flask-vial',
    color: '#0B6FBE',
    desc: 'Everything you need to get into medical school.',
    items: [
      {
        id: 'mcat',
        name: 'MCAT',
        icon: 'fa-flask-vial',
        color: '#0B6FBE',
        desc: '3,000+ QBank questions, full-length practice exams, score simulator, and detailed analytics.',
        available: true,
        url: 'pre-med/mcat.html'
      }
    ]
  },
  {
    id: 'college-prep',
    name: 'College Prep',
    icon: 'fa-pen-nib',
    color: '#2C7A7B',
    desc: 'SAT, ACT, and AP exam prep for high school students.',
    items: [
      { id: 'sat-act',     name: 'SAT & ACT',    icon: 'fa-pen-nib',          color: '#2C7A7B', desc: 'Digital SAT and ACT prep with adaptive practice and score prediction.' },
      { id: 'ap-ela-lote', name: 'AP ELA-LOTE',  icon: 'fa-book-open',        color: '#2C7A7B', desc: 'AP English Language & Literature and World Languages.' },
      { id: 'ap-history',  name: 'AP History',   icon: 'fa-landmark',         color: '#2C7A7B', desc: 'AP US History, World History, and Government.' },
      { id: 'ap-stats',    name: 'AP Stats',     icon: 'fa-chart-bar',        color: '#2C7A7B', desc: 'AP Statistics with data analysis and inference practice.' },
      { id: 'ap-math',     name: 'AP Math',      icon: 'fa-square-root-variable', color: '#2C7A7B', desc: 'AP Calculus AB/BC and Precalculus.' },
      { id: 'ap-science',  name: 'AP Science',   icon: 'fa-atom',             color: '#2C7A7B', desc: 'AP Biology, Chemistry, Physics, and Environmental Science.' },
    ]
  },
  {
    id: 'legal',
    name: 'Legal',
    icon: 'fa-scale-balanced',
    color: '#9C4221',
    desc: 'Bar exam and law school admission preparation.',
    items: []
  },
  {
    id: 'finance',
    name: 'Finance',
    icon: 'fa-chart-line',
    color: '#276749',
    desc: 'Professional finance certifications and investment exams.',
    items: [
      { id: 'cfa-cmt', name: 'CFA / CMT', icon: 'fa-chart-line', color: '#276749', desc: 'CFA Level I–III and CMT exam prep with practice questions and analytics.' }
    ]
  },
  {
    id: 'accounting',
    name: 'Accounting',
    icon: 'fa-calculator',
    color: '#2C5282',
    desc: 'CPA and CMA licensing exam preparation.',
    items: [
      { id: 'cpa-cma',    name: 'CPA / CMA',    icon: 'fa-calculator',   color: '#2C5282', desc: 'US CPA and CMA exam prep with task-based simulations and MCQs.' },
      { id: 'cpa-canada', name: 'CPA Canada',   icon: 'fa-flag',         color: '#2C5282', desc: 'CPA Canada Common Final Examination preparation.' },
      { id: 'cpa-old',    name: 'CPA (Legacy)', icon: 'fa-clock-rotate-left', color: '#2C5282', desc: 'Legacy CPA exam content and archived practice materials.' },
    ]
  },
  {
    id: 'pharmacy',
    name: 'Pharmacy',
    icon: 'fa-pills',
    color: '#744210',
    desc: 'NAPLEX and MPJE pharmacist licensure exam preparation.',
    items: []
  },
];

// ═══════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════
function hasAvailable(cat) {
  return cat.items.some(i => i.available);
}

function folderCard(cat) {
  const available = hasAvailable(cat);
  const count = cat.items.length;
  const comingSoon = !available;
  const badgeHTML = available
    ? `<span class="badge badge-available">Available</span>`
    : `<span class="badge badge-soon">Coming Soon</span>`;

  const ctaLabel = count > 0
    ? (available ? 'Open' : 'Coming Soon')
    : 'Coming Soon';
  const ctaIcon = count > 0 && available ? 'fa-arrow-right' : 'fa-clock';

  const metaLabel = count > 0
    ? `${count} product${count > 1 ? 's' : ''}`
    : 'No products yet';

  const clickHandler = count > 0 && available
    ? `openFolder('${cat.id}')`
    : count > 0
      ? `openFolder('${cat.id}')`
      : '';

  return `
    <div class="folder${comingSoon ? ' coming-soon' : ''}"
         style="--folder-color:${cat.color}"
         ${clickHandler ? `onclick="${clickHandler}"` : ''}>
      <div class="folder-accent"></div>
      <div class="folder-body">
        <div class="folder-top">
          <div class="folder-icon"><i class="fa-solid ${cat.icon}"></i></div>
          <div class="folder-badges">${badgeHTML}</div>
        </div>
        <div>
          <div class="folder-name">${cat.name}</div>
          <div class="folder-sub">${cat.desc}</div>
        </div>
        <div class="folder-footer">
          <span class="folder-cta">${ctaLabel} <i class="fa-solid ${ctaIcon}"></i></span>
          <span class="folder-meta"><i class="fa-solid fa-folder"></i> ${metaLabel}</span>
        </div>
      </div>
    </div>`;
}

function productCard(item) {
  const comingSoon = !item.available;
  const badge = item.available
    ? `<span class="badge badge-available">Available</span>`
    : `<span class="badge badge-soon">Coming Soon</span>`;
  const clickHandler = item.available && item.url
    ? `window.location.href='${item.url}'`
    : '';

  return `
    <div class="product${comingSoon ? ' coming-soon' : ''}"
         style="--product-color:${item.color}"
         ${clickHandler ? `onclick="${clickHandler}"` : ''}>
      <div class="product-accent"></div>
      <div class="product-body">
        <div class="product-top">
          <div class="product-icon"><i class="fa-solid ${item.icon}"></i></div>
          <div>${badge}</div>
        </div>
        <div class="product-name">${item.name}</div>
        <div class="product-desc">${item.desc}</div>
        <div class="product-footer">
          <span class="product-cta">
            ${item.available ? 'Open Dashboard' : 'Coming Soon'}
            <i class="fa-solid ${item.available ? 'fa-arrow-right' : 'fa-clock'}"></i>
          </span>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════
function renderHome() {
  const view = document.getElementById('view');
  view.innerHTML = `
    <div class="view">
      <div class="section-hd">
        <div>
          <div class="section-label">Exam Prep Products</div>
          <div class="section-title">Choose Your Category</div>
        </div>
        <span class="section-count">${PRODUCTS.length} categories</span>
      </div>
      <div class="grid">
        ${PRODUCTS.map(folderCard).join('')}
      </div>
    </div>`;

  // breadcrumb
  document.getElementById('breadcrumb').classList.add('hidden');
  document.title = 'UWorld – Choose Your Exam';
}

function openFolder(id) {
  const cat = PRODUCTS.find(p => p.id === id);
  if (!cat) return;

  // If only 1 available product and no coming-soon siblings, go directly
  if (cat.items.length === 1 && cat.items[0].available && cat.items[0].url) {
    window.location.href = cat.items[0].url;
    return;
  }

  const view = document.getElementById('view');
  view.innerHTML = `
    <div class="view">
      <div class="section-hd">
        <div>
          <div class="section-label" style="color:${cat.color}">${cat.name}</div>
          <div class="section-title">Select a Product</div>
        </div>
        <span class="section-count">${cat.items.length} product${cat.items.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="grid">
        ${cat.items.map(productCard).join('')}
      </div>
    </div>`;

  // breadcrumb
  const bc = document.getElementById('breadcrumb');
  bc.classList.remove('hidden');
  document.getElementById('breadcrumb-current').textContent = cat.name;
  document.title = `UWorld – ${cat.name}`;
}

function goHome() {
  renderHome();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderHome();
</script>
</body>
</html>
